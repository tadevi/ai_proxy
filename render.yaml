databases:
  - name: passthrough-db
    databaseName: passthrough
    user: passthrough
    plan: basic-256mb

services:
  - type: web
    name: passthrough
    runtime: node
    plan: starter
    # preDeployCommand (below) only runs on paid Render plans. On the free tier, folding
    # the migration into buildCommand is the workaround — it still runs before the new
    # instance is deployed/cut over, so a bad migration still blocks the deploy instead
    # of shipping app code against a stale schema. Safe to run twice (drizzle's migrate()
    # is idempotent) if this service is ever upgraded and preDeployCommand starts firing too.
    buildCommand: pnpm install --frozen-lockfile && pnpm run build && pnpm db:migrate
    preDeployCommand: pnpm db:migrate
    startCommand: pnpm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: passthrough-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: CREDENTIAL_ENCRYPTION_KEY
        sync: false
      - key: PUBLIC_URL
        sync: false
      - key: ALLOW_PRIVATE_UPSTREAMS
        value: false
      - key: UPSTREAM_TIMEOUT_MS
        value: 60000
