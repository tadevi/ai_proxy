databases:
  - name: passthrough-db
    databaseName: passthrough
    user: passthrough
    plan: basic-256mb

services:
  - type: web
    name: passthrough
    runtime: node
    plan: starter
    buildCommand: pnpm install --frozen-lockfile && pnpm run build
    preDeployCommand: pnpm db:migrate
    startCommand: pnpm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: passthrough-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: CREDENTIAL_ENCRYPTION_KEY
        sync: false
      - key: PUBLIC_URL
        sync: false
      - key: ALLOW_PRIVATE_UPSTREAMS
        value: false
      - key: UPSTREAM_TIMEOUT_MS
        value: 60000
